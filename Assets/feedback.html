<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>feedback</title>
</head>
<body>
    <header>
        <h1>Feedback</h1>
    </header>
    <main>
        <form action="./submit.html" method="post">
            <div>
                <!-- this is for username -->
                <label for="username">Username :</label>
                <input type="text" name="username" placeholder="Username" id="username" autofocus required>
            </div>
            <div>
                <!-- This is for email  -->
                <label for="email">Email :</label>
                <input type="email" name="email" placeholder="Email" id="email" required>
            </div>
            <div>
                <!-- this is for password -->
                 <label for="password">Password :</label>
                 <input type="password" name="password" placeholder="password" id="password" required>
            </div>
            <div>
                <!-- this is for gender -->
                 <input type="radio" name="gender" id="male" value="male">
                 <label for="male">Male</label>
                 <input type="radio" name="gender" id="female" value="female">
                 <label for="female">Female</label>

            </div>
            <div>
                <!-- This is for check boox -->
                 <input type="checkbox" name="newsletter" id="newsletter" value="yes">
                 <label for="newsletter">Newsletter</label>
            </div>
            <div>
                <!-- This is for text area -->
                 <label for="comment">Comment :</label>
                 <br>
                 <textarea name="comment" id="comment" placeholder="comment" rows="5" cols="30"></textarea>
            </div>
            <span>
                <button type="submit">Submit</button>
                <button type="reset">Reset</button>
            </span>

        </form>
    </main>
    
</body>
</html>
